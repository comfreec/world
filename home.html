<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>쭈니 국기 게임</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌍 쭈니 국기 게임</h1>
            <p class="subtitle">재미있게 세계 국기를 배워보세요!</p>
        </div>

        <div class="game-cards">
            <div class="game-card" onclick="location.href='index.html'">
                <div class="game-icon">🎯</div>
                <h2>국기 퀴즈</h2>
                <p>국기를 보고 나라 이름을 맞춰보세요</p>
                <div class="high-score" id="quizHighScore">최고 점수: 0</div>
            </div>

            <div class="game-card" onclick="location.href='memory-game/index.html'">
                <div class="game-icon">🧠</div>
                <h2>메모리 게임</h2>
                <p>같은 국기를 찾아 짝을 맞춰보세요</p>
                <div class="high-score">
                    <div id="memoryPlayer1">아빠 최고: 0</div>
                    <div id="memoryPlayer2">쭈니 최고: 0</div>
                </div>
            </div>
        </div>

        <div class="stats-section">
            <h3>📊 전체 통계</h3>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="totalGames">0</div>
                    <div class="stat-label">총 게임 수</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalScore">0</div>
                    <div class="stat-label">총 점수</div>
                </div>
            </div>
        </div>

        <button class="settings-btn" onclick="openSettings()">⚙️ 설정</button>
    </div>

    <script src="home.js"></script>
</body>
</html>
