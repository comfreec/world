<!DOCTYPE html>
<html>
<head>
    <title>아이콘 생성기</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: Arial;
        }
        .icon {
            width: 512px;
            height: 512px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 300px;
            border-radius: 100px;
            margin: 20px;
        }
        .small {
            width: 192px;
            height: 192px;
            font-size: 120px;
            border-radius: 40px;
        }
    </style>
</head>
<body>
    <h1>앱 아이콘</h1>
    <p>아래 아이콘을 스크린샷으로 저장하세요</p>
    
    <h2>512x512 (icon-512.png)</h2>
    <div class="icon">🌍</div>
    
    <h2>192x192 (icon-192.png)</h2>
    <div class="icon small">🌍</div>
    
    <p>스크린샷을 찍어서 icon-512.png와 icon-192.png로 저장하세요</p>
</body>
</html>
