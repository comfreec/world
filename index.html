<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>쭈니 국기 게임</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="stylesheet" href="home.css?v=6">
    <link rel="stylesheet" href="achievements.css">
    <style>
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        
        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-icon {
            font-size: 100px;
            animation: bounce 1s infinite;
        }
        
        .loading-text {
            color: white;
            font-size: 1.5em;
            margin-top: 20px;
            font-weight: bold;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <!-- 로딩 화면 -->
    <div id="loadingScreen" class="loading-screen">
        <div class="loading-icon">🌍</div>
        <div class="loading-text">쭈니 국기 게임</div>
    </div>
    <div class="container">
        <div class="header">
            <h1>🌍 쭈니 국기 게임</h1>
            <p class="subtitle">재미있게 세계 국기를 배워보세요!</p>
        </div>

        <div class="game-cards">
            <div class="game-card" onclick="location.href='quiz.html'">
                <div class="game-icon">🎯</div>
                <h2>국기 퀴즈</h2>
                <p>국기를 보고 나라 이름을 맞춰보세요</p>
                <div class="high-score" id="quizHighScore">최고 점수: 0</div>
            </div>

            <div class="game-card" onclick="location.href='memory-game/index.html'">
                <div class="game-icon">🧠</div>
                <h2>메모리 게임</h2>
                <p>같은 국기를 찾아 짝을 맞춰보세요</p>
                <div class="high-score">
                    <div id="memoryPlayer1">아빠 최고: 0</div>
                    <div id="memoryPlayer2">쭈니 최고: 0</div>
                </div>
            </div>
            
            <div class="game-card" onclick="location.href='learn.html'">
                <div class="game-icon">📚</div>
                <h2>학습 모드</h2>
                <p>195개 국가의 국기를 탐색하고 학습하세요</p>
                <div class="high-score">즐겨찾기 & 검색</div>
            </div>
        </div>

        <div class="stats-section">
            <h3>📊 전체 통계</h3>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="totalGames">0</div>
                    <div class="stat-label">총 게임 수</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalScore">0</div>
                    <div class="stat-label">총 점수</div>
                </div>
            </div>
            <button class="view-stats-btn" onclick="location.href='stats.html'">상세 통계 보기 →</button>
        </div>

        <div class="achievements-section">
            <h3>🏆 성취</h3>
            <div id="achievementsList" class="achievements-grid"></div>
        </div>

        <button class="settings-btn" onclick="openSettings()">⚙️ 설정</button>
        
        <button class="about-btn" onclick="location.href='about.html'">ℹ️ 앱 정보</button>
        
        <button class="share-btn" onclick="shareScore()">📤 점수 공유하기</button>
        
        <button id="installBtn" class="install-btn" style="display: none;">
            📱 홈 화면에 추가
        </button>
    </div>

    <!-- 설정 모달 -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>⚙️ 설정</h2>
            <div class="setting-section">
                <h3>🎮 게임 설정</h3>
                <p>각 게임 내에서 효과음과 음성 안내를 설정할 수 있습니다.</p>
                <button onclick="location.href='quiz.html'" class="setting-link-btn">퀴즈 게임 설정</button>
                <button onclick="location.href='memory-game/index.html'" class="setting-link-btn">메모리 게임 설정</button>
            </div>
            <div class="setting-section">
                <h3>📊 데이터 관리</h3>
                <button onclick="location.href='stats.html'" class="setting-link-btn">통계 및 데이터 초기화</button>
            </div>
            <div class="setting-section">
                <h3>ℹ️ 정보</h3>
                <button onclick="location.href='about.html'" class="setting-link-btn">앱 정보</button>
            </div>
            <button id="closeSettingsBtn" class="btn">닫기</button>
        </div>
    </div>

    <script src="achievements.js"></script>
    <script src="home.js?v=3"></script>
    <script>
        // Service Worker 등록
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('Service Worker 등록 성공:', registration);
                    })
                    .catch(error => {
                        console.log('Service Worker 등록 실패:', error);
                    });
            });
        }
        
        // PWA 설치 프롬프트
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });
        
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`사용자 선택: ${outcome}`);
                deferredPrompt = null;
                installBtn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
