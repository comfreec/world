<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>쭈니 국기 메모리 게임</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="stylesheet" href="./style-mobile.css?v=40">
    <link rel="stylesheet" href="../achievements.css">
</head>
<body>
    <div class="container">
        <div class="header-row">
            <div class="left-section">
                <button class="btn btn-small home-btn" onclick="location.href='../index.html'">🏠</button>
                
                <div class="scores-container">
                    <div class="player-score player1">
                        <span class="player-name">아빠</span>
                        <span class="score-value" id="player1Score">0</span>
                    </div>
                    
                    <div class="player-score player2">
                        <span class="player-name">쭈니</span>
                        <span class="score-value" id="player2Score">0</span>
                    </div>
                </div>
            </div>
            
            <h1>🌍 쭈니 국기 메모리 게임</h1>
            
            <div class="right-section">
                <select id="difficultySelect" class="difficulty-select">
                    <option value="8">쉬움</option>
                    <option value="12">보통</option>
                    <option value="16" selected>어려움</option>
                </select>
                
                <button id="restartBtn" class="btn btn-small">새 게임</button>
                
                <button id="settingsBtn" class="btn btn-small">⚙️</button>
            </div>
        </div>
        
        <div class="game-info">
            <div class="info-item">
                시도: <span id="attempts">0</span>회
            </div>
        </div>

        <div id="currentPlayer" class="current-player">아빠 차례</div>

        <div id="gameBoard" class="game-board"></div>

        <div id="winModal" class="modal">
            <div class="modal-content">
                <h2>🎉 축하합니다! 🎉</h2>
                <p id="winMessage"></p>
                <button id="playAgainBtn" class="btn">다시 하기</button>
            </div>
        </div>
        
        <!-- 설정 모달 -->
        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <h2>⚙️ 설정</h2>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="soundToggle" checked>
                        <span>효과음</span>
                    </label>
                </div>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="voiceToggle" checked>
                        <span>음성 안내</span>
                    </label>
                </div>
                <div class="setting-section">
                    <h3>🌍 대륙 선택</h3>
                    <p class="continent-hint">지도에서 대륙을 클릭하세요</p>
                    <div class="world-map-container">
                        <svg viewBox="0 0 1000 500" class="world-map">
                            <!-- 배경 (바다) -->
                            <rect width="1000" height="500" fill="#a8daff"/>
                            
                            <!-- 북아메리카 & 남아메리카 -->
                            <path id="america" class="continent" data-continent="america"
                                d="M 180,80 L 200,60 L 220,55 L 240,60 L 255,75 L 265,95 L 270,115 L 268,135 L 260,155 L 250,170 L 245,185 L 242,200 L 240,215 L 235,230 L 228,245 L 220,258 L 210,268 L 200,275 L 188,280 L 175,283 L 165,285 L 158,290 L 155,300 L 153,315 L 152,330 L 153,345 L 155,360 L 158,375 L 160,388 L 158,400 L 153,410 L 145,415 L 135,413 L 128,408 L 123,400 L 120,388 L 118,375 L 115,360 L 112,345 L 108,330 L 105,315 L 103,300 L 102,285 L 103,270 L 105,255 L 108,240 L 112,225 L 118,210 L 125,195 L 133,182 L 142,170 L 152,160 L 162,152 L 170,145 L 175,135 L 178,125 L 180,115 L 182,105 L 183,95 Z" />
                            
                            <!-- 유럽 -->
                            <path id="europe" class="continent" data-continent="europe"
                                d="M 480,100 L 495,95 L 510,93 L 525,95 L 538,100 L 548,108 L 555,118 L 560,130 L 562,143 L 560,156 L 555,168 L 548,178 L 538,185 L 525,190 L 510,192 L 495,190 L 482,185 L 472,178 L 465,168 L 460,156 L 458,143 L 460,130 L 465,118 L 472,108 Z" />
                            
                            <!-- 아프리카 -->
                            <path id="africa" class="continent" data-continent="africa"
                                d="M 485,200 L 500,198 L 515,198 L 530,200 L 543,205 L 553,213 L 560,223 L 565,235 L 568,250 L 568,265 L 566,280 L 562,295 L 556,310 L 548,323 L 538,335 L 525,345 L 510,352 L 495,355 L 480,353 L 467,348 L 456,340 L 448,330 L 443,318 L 440,305 L 439,290 L 440,275 L 443,260 L 448,245 L 455,232 L 463,220 L 473,210 Z" />
                            
                            <!-- 아시아 -->
                            <path id="asia" class="continent" data-continent="asia"
                                d="M 590,95 L 615,90 L 640,88 L 665,90 L 690,95 L 715,102 L 738,112 L 758,125 L 775,140 L 788,157 L 798,175 L 805,195 L 808,215 L 807,235 L 802,253 L 793,268 L 780,280 L 763,288 L 743,293 L 720,295 L 695,293 L 670,288 L 648,280 L 630,268 L 615,253 L 605,235 L 598,215 L 595,195 L 595,175 L 598,157 L 603,140 L 610,125 L 620,112 L 632,102 L 645,96 Z" />
                            
                            <!-- 오세아니아 (호주) -->
                            <path id="oceania" class="continent" data-continent="oceania"
                                d="M 750,310 L 770,308 L 790,310 L 808,315 L 823,323 L 835,333 L 843,345 L 848,358 L 850,372 L 848,386 L 843,398 L 835,408 L 823,415 L 808,420 L 790,422 L 770,420 L 752,415 L 738,408 L 728,398 L 722,386 L 718,372 L 718,358 L 722,345 L 728,333 L 738,323 Z" />
                            
                            <!-- 대륙 라벨 -->
                            <text x="165" y="220" class="continent-label" style="font-size: 16px;">아메리카</text>
                            <text x="510" y="145" class="continent-label" style="font-size: 14px;">유럽</text>
                            <text x="510" y="275" class="continent-label" style="font-size: 16px;">아프리카</text>
                            <text x="700" y="195" class="continent-label" style="font-size: 18px;">아시아</text>
                            <text x="785" y="365" class="continent-label" style="font-size: 14px;">오세아니아</text>
                        </svg>
                        <div class="continent-buttons">
                            <button class="continent-btn active" data-continent="all">🌍 전체</button>
                        </div>
                    </div>
                    <div class="selected-continent">선택: <span id="selectedContinentText">전체</span></div>
                </div>
                <button id="closeSettingsBtn" class="btn">닫기</button>
            </div>
        </div>
    </div>

    <script src="../achievements.js"></script>
    <script src="./script.js?v=37"></script>
</body>
</html>
