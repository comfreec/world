<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>세계 국기 마스터 - 메모리 게임</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="stylesheet" href="./style-mobile.css?v=50">
    <link rel="stylesheet" href="../achievements.css">
</head>
<body>
    <div class="container">
        <div class="header-row">
            <div class="left-section">
                <button class="btn btn-small home-btn" onclick="location.href='../index.html'">🏠</button>
                
                <div class="scores-container">
                    <div class="player-score player1">
                        <span class="player-name">플레이어 1</span>
                        <span class="score-value" id="player1Score">0</span>
                    </div>
                    
                    <div class="player-score player2">
                        <span class="player-name">플레이어 2</span>
                        <span class="score-value" id="player2Score">0</span>
                    </div>
                </div>
            </div>
            
            <h1><span class="flag-icon"></span> 국기 메모리 게임</h1>
            
            <div class="right-section">
                <select id="difficultySelect" class="difficulty-select">
                    <option value="8">쉬움</option>
                    <option value="12">보통</option>
                    <option value="16" selected>어려움</option>
                </select>
                
                <button id="restartBtn" class="btn btn-small">새 게임</button>
                
                <button id="settingsBtn" class="btn btn-small">⚙️</button>
            </div>
        </div>

        <div id="currentPlayer" class="current-player">플레이어 1 차례</div>

        <div id="gameBoard" class="game-board"></div>

        <div id="winModal" class="modal">
            <div class="modal-content">
                <h2>🎉 축하합니다! 🎉</h2>
                <p id="winMessage"></p>
                <button id="playAgainBtn" class="btn">다시 하기</button>
            </div>
        </div>
        
        <!-- 설정 모달 -->
        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <h2>⚙️ 설정</h2>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="soundToggle" checked>
                        <span>효과음</span>
                    </label>
                </div>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="voiceToggle" checked>
                        <span>음성 안내</span>
                    </label>
                </div>
                <div class="setting-section">
                    <h3><span class="flag-icon-small"></span> 대륙 선택</h3>
                    <div class="continent-grid">
                        <button class="continent-card active" data-continent="all">
                            <div class="continent-icon"><span class="flag-icon-small"></span></div>
                            <div class="continent-name">전체</div>
                        </button>
                        <button class="continent-card" data-continent="asia">
                            <div class="continent-icon">🏯</div>
                            <div class="continent-name">아시아</div>
                        </button>
                        <button class="continent-card" data-continent="europe">
                            <div class="continent-icon">🏰</div>
                            <div class="continent-name">유럽</div>
                        </button>
                        <button class="continent-card" data-continent="america">
                            <div class="continent-icon">🗽</div>
                            <div class="continent-name">아메리카</div>
                        </button>
                        <button class="continent-card" data-continent="africa">
                            <div class="continent-icon">🦁</div>
                            <div class="continent-name">아프리카</div>
                        </button>
                        <button class="continent-card" data-continent="oceania">
                            <div class="continent-icon">🦘</div>
                            <div class="continent-name">오세아니아</div>
                        </button>
                    </div>
                </div>
                <button id="closeSettingsBtn" class="btn">닫기</button>
            </div>
        </div>
    </div>

    <script src="../achievements.js"></script>
    <script src="./script.js?v=41"></script>
</body>
</html>
