<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>쭈니 국기 메모리 게임</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="stylesheet" href="./style-mobile.css?v=28">
    <link rel="stylesheet" href="../achievements.css">
</head>
<body>
    <div class="container">
        <div class="header-row">
            <button class="btn btn-small" onclick="location.href='../index.html'">🏠 홈</button>
            <button id="restartBtn" class="btn btn-small">새 게임</button>
            
            <div class="player-score player1">
                <span class="player-name">아빠</span>
                <span class="score-value" id="player1Score">0</span>
            </div>
            
            <h1>🌍 쭈니 국기 메모리 게임</h1>
            
            <div class="player-score player2">
                <span class="player-name">쭈니</span>
                <span class="score-value" id="player2Score">0</span>
            </div>
            
            <button id="settingsBtn" class="btn btn-small">⚙️</button>
        </div>
        
        <div class="difficulty-selector">
            <button class="difficulty-btn active" data-pairs="8">쉬움 (8쌍)</button>
            <button class="difficulty-btn" data-pairs="12">보통 (12쌍)</button>
            <button class="difficulty-btn" data-pairs="16">어려움 (16쌍)</button>
        </div>

        <div class="game-info">
            <div class="info-item">
                시도: <span id="attempts">0</span>회
            </div>
        </div>

        <div id="currentPlayer" class="current-player">아빠 차례</div>

        <div id="gameBoard" class="game-board"></div>

        <div id="winModal" class="modal">
            <div class="modal-content">
                <h2>🎉 축하합니다! 🎉</h2>
                <p id="winMessage"></p>
                <button id="playAgainBtn" class="btn">다시 하기</button>
            </div>
        </div>
        
        <!-- 설정 모달 -->
        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <h2>⚙️ 설정</h2>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="soundToggle" checked>
                        <span>효과음</span>
                    </label>
                </div>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="voiceToggle" checked>
                        <span>음성 안내</span>
                    </label>
                </div>
                <button id="closeSettingsBtn" class="btn">닫기</button>
            </div>
        </div>
    </div>

    <script src="../achievements.js"></script>
    <script src="./script.js?v=33"></script>
</body>
</html>
