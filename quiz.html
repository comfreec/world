<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>세계 국기 마스터 - 퀴즈</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="stylesheet" href="quiz.css?v=21">
    <link rel="stylesheet" href="achievements.css">
</head>
<body>
    <div class="container">
        <div class="header-with-settings">
            <button class="home-btn" onclick="location.href='index.html'">🏠</button>
            <h1>🌍 세계 국기 마스터</h1>
            <button id="settingsBtn" class="settings-btn">⚙️</button>
        </div>
        
        <div class="game-settings-combined">
            <div class="setting-group">
                <label for="gameModeSelect">게임 모드:</label>
                <select id="gameModeSelect" class="game-mode-select">
                    <option value="normal" selected>일반</option>
                    <option value="timeattack">타임어택</option>
                    <option value="survival">서바이벌</option>
                </select>
            </div>
            
            <div class="setting-group" id="difficultySelectorDiv">
                <label for="difficultySelect">난이도:</label>
                <select id="difficultySelect" class="difficulty-select">
                    <option value="10">쉬움</option>
                    <option value="20" selected>보통</option>
                    <option value="30">어려움</option>
                    <option value="50">도전</option>
                </select>
            </div>
        </div>
        
        <div class="mode-toggle" style="display: none;">
            <button id="choiceMode" class="mode-btn active">선택 모드</button>
            <button id="inputMode" class="mode-btn">입력 모드 (2배)</button>
        </div>
        
        <div class="score-board">
            <div class="score">점수: <span id="score">0</span></div>
            <div class="total">총 문제: <span id="total">0</span></div>
            <div class="timer" id="timerDisplay" style="display: none;">⏱️ <span id="timer">60</span>초</div>
            <div class="lives" id="livesDisplay" style="display: none;">❤️ <span id="lives">3</span></div>
        </div>

        <div class="game-area">
            <div class="flag-container">
                <div id="flag" class="flag"></div>
            </div>

            <div id="choiceArea" class="choice-area">
                <div class="options">
                    <button class="option-btn" id="option1"></button>
                    <button class="option-btn" id="option2"></button>
                    <button class="option-btn" id="option3"></button>
                    <button class="option-btn" id="option4"></button>
                    <button class="option-btn" id="option5" style="display: none;"></button>
                    <button class="option-btn" id="option6" style="display: none;"></button>
                    <button class="option-btn" id="option7" style="display: none;"></button>
                    <button class="option-btn" id="option8" style="display: none;"></button>
                </div>
            </div>

            <div id="inputArea" class="input-area" style="display: none;">
                <div class="canvas-controls">
                    <input type="text" id="countryInput" class="country-input" placeholder="국가 이름을 입력하세요">
                    <button id="submitBtn" class="submit-btn">확인</button>
                </div>
            </div>

            <div id="feedback" class="feedback"></div>
        </div>

        <button id="nextBtn" class="next-btn" style="display: none;">다음 문제</button>
        <button id="restartBtn" class="restart-btn" style="display: none;">다시 시작</button>
    </div>

    <!-- 설정 모달 -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>⚙️ 설정</h2>
            <div class="setting-item">
                <label>
                    <input type="checkbox" id="soundToggle" checked>
                    <span>효과음</span>
                </label>
            </div>
            <div class="setting-item">
                <label>
                    <input type="checkbox" id="voiceToggle" checked>
                    <span>음성 안내</span>
                </label>
            </div>
            <button id="closeSettingsBtn" class="btn">닫기</button>
        </div>
    </div>

    <script src="achievements.js"></script>
    <script src="quiz.js?v=24"></script>
</body>
</html>
