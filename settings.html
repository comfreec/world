<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설정 - 세계 국기 마스터</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .back-btn {
            padding: 10px 20px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
        }
        h1 {
            color: white;
            font-size: 2em;
        }
        .settings-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #eee;
        }
        .setting-item:last-child {
            border-bottom: none;
        }
        .setting-label {
            flex: 1;
        }
        .setting-label h3 {
            color: #333;
            margin-bottom: 5px;
        }
        .setting-label p {
            color: #666;
            font-size: 0.9em;
        }
        .toggle-switch {
            position: relative;
            width: 60px;
            height: 30px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 30px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #667eea;
        }
        input:checked + .slider:before {
            transform: translateX(30px);
        }
        .speed-control {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 200px;
        }
        .speed-slider {
            width: 100%;
        }
        .speed-value {
            text-align: center;
            color: #667eea;
            font-weight: bold;
        }
        .save-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="location.href='index.html'">← 뒤로</button>
            <h1>⚙️ 설정</h1>
        </div>

        <div class="settings-card">
            <div class="setting-item">
                <div class="setting-label">
                    <h3>🔊 음성 안내</h3>
                    <p>국가 이름을 음성으로 들려줍니다</p>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" id="voiceToggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <div class="setting-label">
                    <h3>🎵 효과음</h3>
                    <p>정답/오답 효과음을 재생합니다</p>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" id="soundToggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <div class="setting-label">
                    <h3>⚡ 음성 속도</h3>
                    <p>음성 안내 속도를 조절합니다</p>
                </div>
                <div class="speed-control">
                    <input type="range" id="speedSlider" class="speed-slider" 
                           min="0.5" max="2.0" step="0.1" value="1.3">
                    <div class="speed-value" id="speedValue">1.3x</div>
                </div>
            </div>
        </div>

        <button class="save-btn" onclick="saveSettings()">💾 설정 저장</button>
    </div>

    <script src="settings.js"></script>
</body>
</html>
