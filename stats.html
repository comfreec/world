<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>통계 - 세계 국기 마스터</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <link rel="stylesheet" href="stats.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="location.href='index.html'">← 뒤로</button>
            <h1>📊 상세 통계</h1>
        </div>

        <div class="stats-section">
            <h2>🎯 퀴즈 게임</h2>
            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-icon">🏆</div>
                    <div class="stat-value" id="quizHighScore">0</div>
                    <div class="stat-label">최고 점수</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏱️</div>
                    <div class="stat-value" id="timeAttackHigh">0</div>
                    <div class="stat-label">타임어택 최고</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💀</div>
                    <div class="stat-value" id="survivalHigh">0</div>
                    <div class="stat-label">서바이벌 최고</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-value" id="quizCorrect">0</div>
                    <div class="stat-label">총 정답 수</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-value" id="maxStreak">0</div>
                    <div class="stat-label">최대 연속 정답</div>
                </div>
            </div>
        </div>

        <div class="stats-section">
            <h2>🧠 메모리 게임</h2>
            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-icon">👨</div>
                    <div class="stat-value" id="player1High">0</div>
                    <div class="stat-label">플레이어 1 최고 기록</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👶</div>
                    <div class="stat-value" id="player2High">0</div>
                    <div class="stat-label">플레이어 2 최고 기록</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⚡</div>
                    <div class="stat-value" id="fastestTime">-</div>
                    <div class="stat-label">최고 속도</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💯</div>
                    <div class="stat-value" id="perfectGames">0</div>
                    <div class="stat-label">완벽한 게임</div>
                </div>
            </div>
        </div>

        <div class="stats-section">
            <h2>🌍 전체 통계</h2>
            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-icon">🎮</div>
                    <div class="stat-value" id="totalGames">0</div>
                    <div class="stat-label">총 게임 수</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🌏</div>
                    <div class="stat-value" id="countriesLearned">0</div>
                    <div class="stat-label">학습한 국가</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🏅</div>
                    <div class="stat-value" id="achievementsUnlocked">0</div>
                    <div class="stat-label">획득한 성취</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📅</div>
                    <div class="stat-value" id="consecutiveDays">0</div>
                    <div class="stat-label">연속 플레이 일수</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🌅</div>
                    <div class="stat-value" id="morningGames">0</div>
                    <div class="stat-label">아침 게임</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🦉</div>
                    <div class="stat-value" id="nightGames">0</div>
                    <div class="stat-label">밤 게임</div>
                </div>
            </div>
        </div>

        <div class="danger-zone">
            <h2>⚠️ 데이터 관리</h2>
            <p>모든 게임 기록과 통계가 삭제됩니다. 이 작업은 되돌릴 수 없습니다.</p>
            <button class="reset-btn" onclick="resetAllData()">🗑️ 모든 데이터 초기화</button>
        </div>
    </div>

    <script src="achievements.js"></script>
    <script src="stats.js"></script>
</body>
</html>
